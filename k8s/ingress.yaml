apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wedding-invitation-frontend
  namespace: wedding-invitation
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - wedding.inspo-club.com
      secretName: wedding-invitation-frontend-tls
  rules:
    - host: wedding.inspo-club.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wedding-invitation-frontend
                port:
                  number: 80
